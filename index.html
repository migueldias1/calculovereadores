
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeador de Carga - QRF Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🚛 Planeador de Carga e Frota</h1>

    <div class="painel-frota" id="painel-frota">
        <h3>Identificação do Camião</h3>
        <p>Digite as 3 primeiras letras da matrícula:</p>
        <div class="linha-input">
            <input type="text" id="placa_busca" class="input-placa" maxlength="3" placeholder="QRF">
            <button class="btn-acao" onclick="buscarCaminhao()">Confirmar Matrícula</button>
        </div>
        
        <div id="msg-frota" class="mensagem-erro"></div>

        <div id="form-cadastro">
            <h3 style="color: #1f77b4;">Cadastrar Novo Camião</h3>
            <div class="grid-cadastro">
                <div>
                    <label>Matrícula</label>
                    <input type="text" id="cad_placa" class="input-placa" maxlength="3" disabled>
                </div>
                <div>
                    <label>Carga Máx. (P13)</label>
                    <input type="number" id="cad_limite" placeholder="Ex: 477">
                </div>
                <div>
                    <label>Comprimento</label>
                    <input type="number" id="cad_cols" placeholder="22">
                </div>
                <div>
                    <label>Largura</label>
                    <input type="number" id="cad_rows" placeholder="6">
                </div>
            </div>
            <button class="btn-acao btn-secundario" onclick="salvarCaminhao()">Salvar na Frota</button>
            <button class="btn-acao btn-cancelar" onclick="fecharCadastro()">Cancelar</button>
        </div>
    </div>

    <div id="area-calculo" style="display: none;">
        <div class="header-ativo">
            <h2 id="titulo-caminhao-ativo"></h2>
            <button class="link-trocar" onclick="trocarCaminhao()">Trocar Camião</button>
        </div>

        <div class="controles">
            <div class="input-group border-green">
                <label class="label-liq">P13 Liquigás</label>
                <input type="number" id="qtd_p13_liq" value="0" min="0">
            </div>
            <div class="input-group border-blue">
                <label class="label-cop">P13 Copagaz</label>
                <input type="number" id="qtd_p13_cop" value="0" min="0">
            </div>
            <div class="input-group"><label>P45</label><input type="number" id="qtd_p45" value="0" min="0"></div>
            <div class="input-group"><label>P20</label><input type="number" id="qtd_p20" value="0" min="0"></div>
            <div class="input-group"><label>P8</label><input type="number" id="qtd_p8" value="0" min="0"></div>
            <div class="input-group"><label>P5</label><input type="number" id="qtd_p5" value="0" min="0"></div>
            
            <div class="ordem-descarga">
                <label>🚚 Qual marca descarrega <b>PRIMEIRO</b>? (Fica nas portas)</label>
                <div class="radio-group">
                    <label class="label-liq"><input type="radio" name="desc_primeiro" value="L" checked> Liquigás</label>
                    <label class="label-cop"><input type="radio" name="desc_primeiro" value="C"> Copagaz</label>
                </div>
            </div>

            <div class="botoes-container">
                <button class="btn-acao flex-2" onclick="gerarMapa()">Calcular e Gerar Mapas</button>
                <button class="btn-acao btn-secundario flex-1" onclick="window.print()">🖨️ Imprimir / PDF</button>
            </div>
        </div>

        <div id="resumo"></div>

        <div class="secao" id="secao_superior" style="display: none;">
            <h3>1. VISTA SUPERIOR (MAPA DE DOCA)</h3>
            <div class="fluxo-indicador"><span>⬅️ CABINE</span><span>PORTAS ➡️</span></div>
            <div class="carroceria-wrapper">
                <div class="grid-dinamico" id="grid_mapa"></div>
                <div class="grid-dinamico" id="grid_acumulado"></div>
                <div class="conferencia-
